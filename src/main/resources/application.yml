management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
server:
  port: 8081
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stormhooks
    username: appuser
    password: apppass
  jpa:
    hibernate:
      ddl-auto: validate   # or update/create for dev
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    validate-migration-naming: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/.well-known/jwks.json
stormhook:
  jwt:
    expected-issuer: "https://auth.stormhook.local"
    expected-audience: "https://api.stormhook.local"