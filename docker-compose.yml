#version
#services
  #image - pre built
  #build - uses docker file

#volumes
#networks

version: '3.8'
volumes:
  db_data:
    name: stormhooks_pgdata
services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=stormhooks
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data


